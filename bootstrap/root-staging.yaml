apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:javierbenitez-itti/mitic-argo-example.git
    targetRevision: main
    path: workloads/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
