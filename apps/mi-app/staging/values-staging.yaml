# values-staging.yaml
# Jenkins actualiza el campo `tag` en cada build exitoso de develop.
# ArgoCD detecta el commit y sincroniza automáticamente.

image:
  repository: registry.gitlab.com/tu-grupo/mi-app   # ← ajustar
  tag: "latest"          # Jenkins reemplaza este valor con BUILD_NUMBER-SHA
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: mi-app-staging.tu-dominio.com               # ← ajustar
  tls: false   # habilitar en staging si hay cert-manager

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: staging
  JAVA_OPTS: "-Xms256m -Xmx768m"

# Configuración extra por ambiente
configMap:
  enabled: true
  data:
    APP_ENV: staging
    LOG_LEVEL: DEBUG

# Secretos (referenciados desde Kubernetes Secrets, no valores en texto)
secrets:
  enabled: true
  name: mi-app-staging-secrets   # Secret creado aparte en el cluster

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 30
  periodSeconds: 15

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 20
  periodSeconds: 10
