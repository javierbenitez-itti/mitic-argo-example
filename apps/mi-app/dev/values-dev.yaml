# values-dev.yaml
# Jenkins actualiza el campo `tag` en cada build exitoso de develop.

image:
  repository: harbor.homelab.arpa/library/mi-java-app
  tag: "1.0.0-SNAPSHOT-6-24b8ab0"
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: mi-app-dev.tu-dominio.com
  tls: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 512Mi

env:
  SPRING_PROFILES_ACTIVE: dev
  JAVA_OPTS: "-Xms128m -Xmx384m"

configMap:
  enabled: true
  data:
    APP_ENV: dev
    LOG_LEVEL: DEBUG

secrets:
  enabled: true
  name: mi-app-dev-secrets

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 30
  periodSeconds: 15

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 20
  periodSeconds: 10
