apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mi-app-dev
  namespace: argocd
  labels:
    environment: dev
    team: backend
spec:
  project: default

  source:
    repoURL: git@github.com:javierbenitez-itti/mitic-argo-example.git
    targetRevision: main
    path: apps/mi-app/base

    helm:
      valueFiles:
        - ../dev/values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: mi-app-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
