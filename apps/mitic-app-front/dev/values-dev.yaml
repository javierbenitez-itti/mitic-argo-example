image:
  repository: harbor.homelab.arpa/library/mitic-app-front
  tag: "1.0.0-SNAPSHOT-12-76b9d35"
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: mitic-app-front-dev.tu-dominio.com
  tls: false

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 50m
    memory: 128Mi

env:
  APP_ENV: dev

configMap:
  enabled: false
  data: {}

secrets:
  enabled: false
  name: mi-app-dev-secrets

livenessProbe:
  enabled: false
  path: /
  initialDelaySeconds: 15
  periodSeconds: 15

readinessProbe:
  enabled: false
  path: /
  initialDelaySeconds: 10
  periodSeconds: 10

# Configuración runtime inyectada vía ConfigMap de Kubernetes.
# Permite cambiar la URL del backend sin reconstruir la imagen Docker.
runtimeConfig:
  enabled: false
  # Nombre del archivo JS que será sobreescrito en el contenedor
  fileName: "config.js"
  # Ruta exacta dentro del contenedor Nginx donde se monta el archivo
  mountPath: "/usr/share/nginx/html/config.js"
  # URL del backend: en K8s mismo namespace usar nombre del Service
  apiBaseUrl: "http://mitic-app-back-dev:8080"

